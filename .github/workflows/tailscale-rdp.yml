name: Tailscale RDP (Fixed)

on: workflow_dispatch

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Create User + Enable RDP
        run: |
          $user = "null-RDP"
          $password = "null@1337"

          net user $user $password /add
          net localgroup administrators $user /add
          net localgroup "Remote Desktop Users" $user /add

          # Enable RDP
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0

          # Enable firewall rules
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

          # Force RDP service
          Set-Service -Name TermService -StartupType Automatic
          Start-Service -Name TermService

          Write-Host "User + RDP ready" -ForegroundColor Green

      - name: Setup Tailscale
        env:
          TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
        run: |
          choco install tailscale -y
          Start-Sleep -Seconds 10

          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey $env:TAILSCALE_AUTHKEY --hostname "github-rdp" --accept-routes

          Write-Host "Waiting for network..." -ForegroundColor Yellow
          Start-Sleep -Seconds 15

          # Show IP
          & "C:\Program Files\Tailscale\tailscale.exe" ip

      - name: Debug RDP
        run: |
          Write-Host "Checking RDP port..." -ForegroundColor Cyan
          netstat -an | findstr 3389

      - name: Keep Alive (6 Hours)
        run: |
          $seconds = 21600
          while ($seconds -gt 0) {
            Start-Sleep -Seconds 60
            $seconds -= 60
            Write-Host "Server Running... ($seconds sec left)"
          }
